<!-- ================================================================
     ADMIN PANEL
     ================================================================ -->
<div id="admin-panel" class="app hidden" style="background: var(--bg2)">
  <header class="header">
    <div class="logo">
      <div class="logo-icon admin">🛡️</div>
      <span>SplitEase Admin</span>
    </div>
    <div class="header-right">
      <div class="user-avatar-wrap">
        <div class="user-avatar admin" id="admin-user-avatar" onclick="uiManager.toggleAccountDropdown(event)" data-tip="Account" data-tip-pos="bottom">?</div>
      </div>
    </div>
  </header>

  <main class="main-content">
    <div class="admin-dashboard-container">
      <div class="admin-header-row">
        <div class="dashboard-header">
          <h1 class="dashboard-title">Platform Administration</h1>
          <p class="dashboard-subtitle">Manage user access, approvals, and platform limits.</p>
        </div>
        <div class="admin-filters">
          <button class="filter-btn active" data-status="all" onclick="adminManager.setFilter('all', this)">All</button>
          <button class="filter-btn" data-status="pending" onclick="adminManager.setFilter('pending', this)">Pending ⏳</button>
          <button class="filter-btn" data-status="approved" onclick="adminManager.setFilter('approved', this)">Approved ✅</button>
          <button class="filter-btn" data-status="rejected" onclick="adminManager.setFilter('rejected', this)">Rejected 🚫</button>
        </div>
      </div>

      <div class="admin-stats-grid">
        <div class="stat-card">
          <div class="stat-label">Total Users</div>
          <div class="stat-value" id="admin-stat-total">-</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Pending Approval</div>
          <div class="stat-value warning" id="admin-stat-pending">-</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Active Users</div>
          <div class="stat-value success" id="admin-stat-active">-</div>
        </div>
      </div>

      <div class="admin-table-container">
        <div id="admin-user-list" class="admin-user-list">
          <!-- User rows/cards injected here -->
          <div class="loading-state">Loading users...</div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- ================================================================
     AUTH SCREEN — shown when user is not logged in
     ================================================================ -->
<div id="auth-screen" class="auth-screen hidden">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">₹</div>
      <div class="auth-logo-text">SplitEase</div>
    </div>

    <!-- Sign In Panel -->
    <div id="auth-signin">
      <div class="auth-title">Welcome back</div>
      <div class="auth-sub">Sign in to access your groups</div>
      <div class="auth-error" id="signin-error"></div>
      <div class="form-group">
        <label>Email</label>
        <input class="input" id="signin-email" type="email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-password-wrap">
          <input class="input" id="signin-password" type="password" placeholder="••••••••" autocomplete="current-password">
          <button class="pw-toggle" onclick="togglePw('signin-password',this)" tabindex="-1">👁</button>
        </div>
      </div>
      <button class="btn btn-primary btn-full" id="signin-btn" onclick="authManager.signIn()">Sign In</button>
      <div style="display:flex;align-items:center;gap:12px;margin:12px 0">
        <div style="flex:1;height:1px;background:var(--border)"></div>
        <span style="font-size:12px;color:var(--text3)">or</span>
        <div style="flex:1;height:1px;background:var(--border)"></div>
      </div>
      <button class="btn btn-secondary btn-full" onclick="authManager.continueAsGuest()" style="font-size:13px">
        👤 Continue as Guest <span style="font-size:11px;color:var(--text3);margin-left:4px">(no account needed)</span>
      </button>
      <div class="auth-switch">Don't have an account? <a onclick="authManager.showRegister()">Create one</a></div>
    </div>

    <!-- Register Panel -->
    <div id="auth-register" class="hidden">
      <div class="auth-title">Create account</div>
      <div class="auth-sub">Start splitting expenses in seconds</div>
      <div class="auth-error" id="register-error"></div>
      <div class="form-group">
        <label>Display Name</label>
        <input class="input" id="reg-name" type="text" placeholder="Your name" autocomplete="name">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input class="input" id="reg-email" type="email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-password-wrap">
          <input class="input" id="reg-password" type="password" placeholder="Min 8 characters"
            autocomplete="new-password" oninput="checkPwStrength(this.value)">
          <button class="pw-toggle" onclick="togglePw('reg-password',this)" tabindex="-1">👁</button>
        </div>
        <div class="pw-strength"><div class="pw-strength-bar" id="pw-bar"></div></div>
        <div class="info-text" id="pw-hint">Use 8+ characters with numbers or symbols</div>
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <div class="input-password-wrap">
          <input class="input" id="reg-password2" type="password" placeholder="Re-enter password" autocomplete="new-password">
          <button class="pw-toggle" onclick="togglePw('reg-password2',this)" tabindex="-1">👁</button>
        </div>
      </div>
      <button class="btn btn-primary btn-full" id="register-btn" onclick="authManager.register()">Create Account</button>
      <div class="auth-switch">Already have an account? <a onclick="authManager.showSignIn()">Sign in</a></div>
    </div>
  </div>
</div>

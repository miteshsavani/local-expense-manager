<!-- ================================================================
     GLOBAL ACCOUNT DROPDOWN
     ================================================================ -->
<div id="account-dropdown" class="account-dropdown hidden">
  <div class="dropdown-header">
    <div id="dropdown-user-name" class="dropdown-user-name">User</div>
    <div id="dropdown-user-email" class="dropdown-user-email">email@example.com</div>
  </div>
  <div class="dropdown-divider"></div>
  <button class="dropdown-item" onclick="setDarkMode(false)">
    <span class="icon">☀️</span> Light Mode
    <span class="check" id="check-light">✓</span>
  </button>
  <button class="dropdown-item" onclick="setDarkMode(true)">
    <span class="icon">🌙</span> Dark Mode
    <span class="check" id="check-dark">✓</span>
  </button>
  <div class="dropdown-divider"></div>
  <button class="dropdown-item" onclick="uiManager.toggleAccountDropdown(event); openSettingsModal();">
    <span class="icon">⚙️</span> Settings
  </button>
  <div class="dropdown-divider"></div>
  <button class="dropdown-item text-danger" onclick="uiManager.toggleAccountDropdown(event); authManager.signOut()">
    <span class="icon">🚪</span> Sign Out
  </button>
</div>

<style>
.account-dropdown {
  position: fixed;
  top: 60px;
  right: 20px;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  box-shadow: var(--shadow-lg);
  width: 220px;
  z-index: 2000; /* Higher than header and status screens */
  padding: 8px 0;
  animation: dropdownIn 0.2s ease-out;
}
@keyframes dropdownIn {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}
.dropdown-header { padding: 12px 16px; }
.dropdown-user-name { font-weight: 700; color: var(--text1); font-size: 14px; }
.dropdown-user-email { font-size: 12px; color: var(--text3); }
.dropdown-divider { height: 1px; background: var(--border); margin: 8px 0; }
.dropdown-item {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 16px;
  border: none;
  background: none;
  color: var(--text2);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
  text-align: left;
}
.dropdown-item:hover { background: var(--surface); }
.dropdown-item .icon { font-size: 16px; }
.dropdown-item .check { margin-left: auto; color: var(--blue); opacity: 0; }
.dropdown-item .check.active { opacity: 1; }
.dropdown-item.text-danger { color: var(--red); }
</style>

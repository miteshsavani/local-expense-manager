<body>
  <!-- Root App Mount -->
  <div id="app"></div>

  <!-- =========================
       HTML Partials Loader
  ========================== -->
<script>
    async function loadHTML(path) {
      const res = await fetch(path);
      return await res.text();
    }

    async function loadScript(src) {
        return new Promise((resolve, reject) => {
            const s = document.createElement("script");
            s.src = src;
            s.onload = resolve;
            s.onerror = reject;
            document.body.appendChild(s);
        });
    }

    async function initApp() {
        const app = document.getElementById("app");

        const splashHTML = await loadHTML("./src/components/html/splash.html");
        const authHTML = await loadHTML("./src/components/html/auth.html");
        const statusHTML = await loadHTML("./src/components/html/status.html");
        const adminHTML = await loadHTML("./src/components/html/admin.html");
        const mainHTML = await loadHTML("./src/components/html/main.html");
        const dropdownHTML = await loadHTML("./src/components/html/dropdown.html");

        app.innerHTML = splashHTML + authHTML + statusHTML + adminHTML + mainHTML + dropdownHTML;

        // ✅ guaranteed order
        await loadScript("./src/js/core/bootstrap.js");
    }

    initApp();
  </script>
